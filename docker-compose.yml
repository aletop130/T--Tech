services:
  # PostgreSQL with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sda-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sda_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sda_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sda_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sda_user} -d ${POSTGRES_DB:-sda_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sda-network

  # Redis for caching and Celery broker
  redis:
    image: redis:7-alpine
    container_name: sda-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sda-network

  # MinIO for object storage
  minio:
    image: minio/minio:latest
    container_name: sda-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sda-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sda-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sda_user}:${POSTGRES_PASSWORD:-sda_secret}@postgres:5432/${POSTGRES_DB:-sda_db}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio_secret}
      - REGOLO_API_KEY=${REGOLO_API_KEY}
      - REGOLO_BASE_URL=${REGOLO_BASE_URL:-https://api.regolo.ai/v1}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - sda-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    command: >
      sh -c "./scripts/wait-for-it.sh postgres 5432 -- alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sda-celery-worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sda_user}:${POSTGRES_PASSWORD:-sda_secret}@postgres:5432/${POSTGRES_DB:-sda_db}
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minio_admin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minio_secret}
      - REGOLO_API_KEY=${REGOLO_API_KEY}
      - REGOLO_BASE_URL=${REGOLO_BASE_URL:-https://api.regolo.ai/v1}
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sda-network
    command: >
      sh -c "./scripts/wait-for-it.sh postgres 5432 -- ./scripts/wait-for-it.sh redis 6379 -- celery -A app.celery_app worker --loglevel=info"

  # Celery Beat (scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sda-celery-beat
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sda_user}:${POSTGRES_PASSWORD:-sda_secret}@postgres:5432/${POSTGRES_DB:-sda_db}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sda-network
    command: >
      sh -c "./scripts/wait-for-it.sh postgres 5432 -- ./scripts/wait-for-it.sh redis 6379 -- celery -A app.celery_app beat --loglevel=info"

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sda-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sda-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    command: sh -c "npm run build -- --webpack && npm start"

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sda-network:
    driver: bridge